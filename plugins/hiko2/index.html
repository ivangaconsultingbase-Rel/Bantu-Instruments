<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>DR-4 V3 — Drum Machine Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* ================= UI CORE ================= */
:root{
--bg:#070a0d; --panel:#0d1118; --panel2:#111620; --border:#1e2832;
--text:#c0ccd8; --muted:#4e6278;
--orange:#ff7c00; --green:#00e87a;
--mono:'Share Tech Mono', monospace; --ui:'Exo 2', sans-serif;
}

body{margin:0;background:var(--bg);color:var(--text);font-family:var(--ui);}
.machine{max-width:1200px;margin:auto;border:1px solid var(--border);border-radius:14px;overflow:hidden}

/* HEADER */
.machine-header{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#111}
button{cursor:pointer}

/* TABS */
.top-tabs{display:flex;gap:6px;padding:10px;background:#151a22}
.top-tab{
padding:6px 14px;border:1px solid var(--border);
background:#0f141c;color:var(--muted);font-family:var(--mono)
}
.top-tab.active{color:var(--orange);border-color:var(--orange)}

/* PAGES */
.page{display:none;padding:10px}
.page.active{display:block}

/* TRACKS */
.track{border:1px solid var(--border);margin-bottom:8px;padding:6px}
.steps{display:grid;grid-template-columns:repeat(16,1fr);gap:4px}
.step{height:36px;border:1px solid #222;background:#111}
.step.on{background:var(--orange)}

/* MIX */
.mix-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mix-strip{border:1px solid var(--border);padding:10px}

/* SLIDERS */
input[type=range]{width:100%}
</style>
</head>

<body>
<div class="machine">

<div class="machine-header">
<button id="audioBtn">AUDIO</button>
<button id="playBtn">PLAY</button>
</div>

<div class="top-tabs">
<button class="top-tab active" data-page="seq">SEQ</button>
<button class="top-tab" data-page="sound">SOUND</button>
<button class="top-tab" data-page="fx">FX</button>
<button class="top-tab" data-page="mix">MIX</button>
</div>

<!-- SEQ -->
<div class="page active" id="page-seq">
<div id="tracks"></div>
</div>

<!-- SOUND -->
<div class="page" id="page-sound">
<h3>PARAMS</h3>
<input id="decay" type="range" min="0" max="1" step="0.01">
<input id="pitch" type="range" min="0" max="1" step="0.01">
</div>

<!-- FX -->
<div class="page" id="page-fx">
<h3>MASTER FX</h3>
<label>Drive</label>
<input id="drive" type="range" min="0" max="1" step="0.01">
</div>

<!-- MIX -->
<div class="page" id="page-mix">
<div class="mix-grid" id="mix"></div>
</div>

</div>

<script>
let ctx, master, comp;

const tracks = [
{ id:'bd', steps:Array(16).fill(0), vol:.8 },
{ id:'sd', steps:Array(16).fill(0), vol:.8 },
{ id:'hh', steps:Array(16).fill(0), vol:.6 },
{ id:'cp', steps:Array(16).fill(0), vol:.7 }
];

let current=0, playing=false;

/* AUDIO INIT */
async function initAudio(){
if(ctx) return;
ctx=new AudioContext();

master=ctx.createGain();
master.gain.value=.9;

comp=ctx.createDynamicsCompressor();
comp.threshold.value=-14;
comp.ratio.value=2.5;

master.connect(comp);
comp.connect(ctx.destination);
}

/* SOUND ENGINE */
function kick(t,vol){
const o=ctx.createOscillator();
const g=ctx.createGain();
o.frequency.setValueAtTime(120,t);
o.frequency.exponentialRampToValueAtTime(40,t+.1);
g.gain.setValueAtTime(vol,t);
g.gain.exponentialRampToValueAtTime(0.001,t+.3);
o.connect(g); g.connect(master);
o.start(t); o.stop(t+.4);
}

/* HUMANIZE */
function human(v,a=.02){return v+(Math.random()*2-1)*a}

/* SEQUENCER */
function tick(){
const t=ctx.currentTime;

tracks.forEach(tr=>{
if(tr.steps[current]){
kick(t, human(tr.vol))
}
});

current=(current+1)%16;
}

/* LOOP */
function start(){
setInterval(()=>{if(playing)tick()},120);
}

/* UI */
function build(){
const el=document.getElementById('tracks');
el.innerHTML=tracks.map(tr=>`
<div class="track">
<div>${tr.id}</div>
<div class="steps">
${tr.steps.map((s,i)=>`
<div class="step ${s?'on':''}" data-t="${tr.id}" data-i="${i}"></div>
`).join('')}
</div>
</div>
`).join('');
}

/* EVENTS */
document.body.addEventListener('click',e=>{
if(e.target.classList.contains('step')){
const t=e.target.dataset.t;
const i=e.target.dataset.i;
const tr=tracks.find(x=>x.id===t);
tr.steps[i]=tr.steps[i]?0:1;
build();
}
});

document.getElementById('audioBtn').onclick=initAudio;
document.getElementById('playBtn').onclick=()=>{
playing=!playing;
};

document.querySelectorAll('.top-tab').forEach(b=>{
b.onclick=()=>{
document.querySelectorAll('.top-tab').forEach(x=>x.classList.remove('active'));
b.classList.add('active');
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('page-'+b.dataset.page).classList.add('active');
};
});

/* INIT */
build();
start();

</script>
</body>
</html>
