<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>DR-4 — Drum Machine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <div class="machine">

    <!-- ── HEADER ─────────────────────────────────────────────────────── -->
    <div class="machine-header">
      <div class="brand">
        <div class="brand-logo">DR<span>4</span></div>
        <div class="brand-sub">DRUM MACHINE</div>
        <div class="brand-sub2">Modor Style · 4 Tracks</div>
      </div>

      <div class="transport-wrap">
        <div class="transport-group">
          <button id="playBtn"  class="transport-btn play-btn">▶ PLAY</button>
          <button id="stopBtn"  class="transport-btn stop-btn">■ STOP</button>
        </div>
        <div class="hw-field">
          <label class="hw-label">BPM</label>
          <div class="bpm-wrap">
            <button class="bpm-adj" id="bpmDown">−</button>
            <input id="bpmNum" type="number" min="60" max="200" value="120" class="bpm-num">
            <button class="bpm-adj" id="bpmUp">+</button>
          </div>
          <input id="bpmSlider" type="range" min="60" max="200" value="120" class="hw-slider wide">
        </div>
        <div class="hw-field narrow">
          <label class="hw-label">SWING</label>
          <input id="swingSlider" type="range" min="0" max="0.4" step="0.01" value="0.08" class="hw-slider">
          <div class="hw-readout" id="swingReadout">8%</div>
        </div>
        <div class="hw-field narrow">
          <label class="hw-label">MASTER</label>
          <input id="masterSlider" type="range" min="0" max="1" step="0.01" value="0.82" class="hw-slider">
          <div class="hw-readout" id="masterReadout">82%</div>
        </div>
      </div>

      <button id="audioBtn" class="audio-btn">
        <span class="audio-dot"></span>START AUDIO
      </button>
    </div>

    <!-- ── TRACKS ─────────────────────────────────────────────────────── -->
    <div class="tracks-section" id="tracksSection"></div>

    <!-- ── PARAM PANEL ────────────────────────────────────────────────── -->
    <div class="params-panel" id="paramsPanel">
      <div class="params-header">
        <div class="params-left">
          <div class="params-track-badge" id="paramsTrackBadge">BD</div>
          <div>
            <div class="params-track-name" id="paramsTrackName">BASS DRUM</div>
            <div class="params-model" id="paramsModel">Drive BD Model</div>
          </div>
        </div>
        <button id="previewTrackBtn" class="preview-mini-btn">▶ PREVIEW</button>
      </div>

      <div class="params-body">
        <!-- Amp Envelope -->
        <div class="pgroup">
          <div class="pgroup-label">AMP ENV</div>
          <div class="prow" id="paramRow_decay"></div>
          <div class="prow" id="paramRow_curve"></div>
        </div>
        <!-- Pitch Envelope -->
        <div class="pgroup">
          <div class="pgroup-label">PITCH ENV</div>
          <div class="prow" id="paramRow_pitch"></div>
          <div class="prow" id="paramRow_amount"></div>
          <div class="prow" id="paramRow_pdec"></div>
          <div class="prow" id="paramRow_pcrv"></div>
        </div>
        <!-- Model params -->
        <div class="pgroup model-group">
          <div class="pgroup-label" id="modelGroupLabel">MODEL PARAMS</div>
          <div class="prow" id="paramRow_x"></div>
          <div class="prow" id="paramRow_y"></div>
          <div class="prow" id="paramRow_z"></div>
          <div class="prow" id="paramRow_t"></div>
        </div>
        <!-- Curve display -->
        <div class="pgroup curve-group">
          <div class="pgroup-label">ENVELOPE CURVE</div>
          <canvas id="envCanvas" width="180" height="72"></canvas>
          <div class="curve-labels">
            <span>LIN</span><span>SQL</span><span>EXP</span><span>SQR</span><span>RCP</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── ACCENT HINT ─────────────────────────────────────────────────── -->
    <div class="hint-bar">
      ESPACE = play/stop &nbsp;·&nbsp; clic = on/off &nbsp;·&nbsp;
      clic-droit ou SHIFT+clic = accent &nbsp;·&nbsp;
      clic sur le nom de la piste = sélectionner
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
