<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>AKOMGA — Synth + Sequencer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="sampler-container">

    <header class="sampler-header">
      <div class="lcd-screen">
        <span class="lcd-title">AKOMGA SYNTH</span>
        <span class="lcd-info">
          BPM <span id="bpm-display">96</span> ·
          SWING <span id="swing-display">0</span>% ·
          SCALE <span id="scale-display">A MIN</span>
        </span>
      </div>
      <div class="header-indicators">
        <div class="led-indicator" id="led"></div>
      </div>
    </header>

    <section>
      <div class="section-header">
        <h2>Keyboard</h2>
        <span class="hint" id="kb-hint">A S D F G H J K · Space: Play/Stop</span>
      </div>
      <div class="section-content">
        <div class="kbd" id="keyboard"></div>
      </div>
    </section>

    <section class="sequencer-section">
      <div class="section-header">
        <h2>Sequencer</h2>
        <span class="hint" id="seq-hint">Tap step: note · Double tap: chord · Long press: mute</span>
      </div>

      <div class="section-content">
        <div class="sequencer-controls">
          <div class="transport">
            <button id="play-btn" class="transport-btn">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              PLAY
            </button>
            <button id="clear-btn" class="transport-btn">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/></svg>
              CLEAR
            </button>
          </div>

          <div class="tempo-control">
            <label>BPM</label>
            <input type="range" id="bpm" min="60" max="160" value="96">
            <span class="tempo-value" id="bpm-val">96</span>
          </div>

          <div class="tempo-control">
            <label>SWING</label>
            <input type="range" id="swing" min="0" max="75" value="0">
            <span class="tempo-value" id="swing-val">0%</span>
          </div>

          <div class="tempo-control">
            <label>HUMAN</label>
            <input type="range" id="humanize" min="0" max="30" value="6">
            <span class="tempo-value" id="humanize-val">6%</span>
          </div>

          <div class="tempo-control">
            <label>TIMING</label>
            <input type="range" id="humanize-time" min="0" max="20" value="8">
            <span class="tempo-value" id="humanize-time-val">8ms</span>
          </div>

          <div class="tempo-control">
            <label>ROOT</label>
            <select id="root">
              <option value="A" selected>A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
              <option value="E">E</option>
              <option value="F">F</option>
              <option value="G">G</option>
            </select>
          </div>

          <div class="tempo-control">
            <label>OCT</label>
            <input type="range" id="oct" min="2" max="6" value="4">
            <span class="tempo-value" id="oct-val">4</span>
          </div>
        </div>

        <div class="seq-header" id="seq-header"></div>
        <div class="sequencer-grid" id="sequencer-grid"></div>
      </div>
    </section>

    <footer class="sampler-footer">
      <p>Tap step = note (degree) · Double tap = chord triad · Long press = OFF · Space = Play/Stop</p>
    </footer>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
