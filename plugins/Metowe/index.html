<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>AKOMGA — Poly Synth + Minor Sequencer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="sampler-container">

    <!-- Header -->
    <header class="sampler-header">
      <div class="lcd-screen">
        <span class="lcd-title">AKOMGA</span>
        <span class="lcd-info">
          BPM <span id="bpm-display">96</span> ·
          SWING <span id="swing-display">0</span>% ·
          SCALE <span id="scale-display">MINOR</span>
        </span>
      </div>

      <div class="header-indicators">
        <div class="led-indicator" id="led" aria-label="LED"></div>
      </div>
    </header>

    <!-- Synth section -->
    <section class="synth-section">
      <div class="section-header">
        <h2>Synth</h2>
        <span class="hint" id="synth-hint">Poly · Juno-ish · Touch friendly</span>
      </div>

      <div class="section-content">
        <div class="effects-grid">

          <div class="effect-control">
            <div class="effect-label">
              <label for="osc-wave">Wave</label>
              <span class="effect-value" id="osc-wave-val">SAW</span>
            </div>
            <div class="segmented" role="group" aria-label="Waveform">
              <button type="button" class="seg-btn active" data-wave="SAW">SAW</button>
              <button type="button" class="seg-btn" data-wave="PULSE">PULSE</button>
              <button type="button" class="seg-btn" data-wave="TRI">TRI</button>
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="cutoff">Cutoff</label>
              <span class="effect-value" id="cutoff-val">2.2k</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="cutoff-fill"></div>
              <input type="range" id="cutoff" min="80" max="12000" value="2200" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="res">Res</label>
              <span class="effect-value" id="res-val">0.12</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="res-fill"></div>
              <input type="range" id="res" min="0" max="0.95" value="0.12" step="0.01" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="envAmt">Env Amt</label>
              <span class="effect-value" id="envAmt-val">1.2k</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="envAmt-fill"></div>
              <input type="range" id="envAmt" min="0" max="6000" value="1200" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="attack">Attack</label>
              <span class="effect-value" id="attack-val">8ms</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="attack-fill"></div>
              <input type="range" id="attack" min="0.001" max="1.2" value="0.008" step="0.001" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="decay">Decay</label>
              <span class="effect-value" id="decay-val">140ms</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="decay-fill"></div>
              <input type="range" id="decay" min="0.001" max="1.5" value="0.14" step="0.001" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="sustain">Sustain</label>
              <span class="effect-value" id="sustain-val">0.70</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="sustain-fill"></div>
              <input type="range" id="sustain" min="0" max="1" value="0.7" step="0.01" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="release">Release</label>
              <span class="effect-value" id="release-val">120ms</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="release-fill"></div>
              <input type="range" id="release" min="0.001" max="2.0" value="0.12" step="0.001" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="master">Master</label>
              <span class="effect-value" id="master-val">90%</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="master-fill"></div>
              <input type="range" id="master" min="0" max="100" value="90" step="1" />
            </div>
          </div>

        </div>
      </div>
    </section>

    <!-- Sequencer section -->
    <section class="sequencer-section">
      <div class="section-header">
        <h2>Sequencer</h2>
        <span class="hint" id="seq-hint">Tap: note · Double: accent · Long: octave</span>
      </div>

      <div class="section-content">
        <div class="sequencer-controls">

          <div class="transport">
            <button id="play-btn" class="transport-btn" type="button">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              PLAY
            </button>

            <button id="clear-btn" class="transport-btn" type="button">
              <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"/>
                <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2"/>
              </svg>
              CLEAR
            </button>

            <button id="met-btn" class="transport-btn" type="button">
              <svg viewBox="0 0 24 24">
                <path d="M6 20h12" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M9 20l2-16h2l2 16" fill="none" stroke="currentColor" stroke-width="2"/>
                <path d="M12 6l6 4" fill="none" stroke="currentColor" stroke-width="2"/>
              </svg>
              MET
            </button>
          </div>

          <div class="tempo-control">
            <label for="bpm">BPM</label>
            <input type="range" id="bpm" min="60" max="160" value="96" />
            <span class="tempo-value" id="bpm-val">96</span>
          </div>

          <div class="tempo-control">
            <label for="swing">SWING</label>
            <input type="range" id="swing" min="0" max="75" value="0" />
            <span class="tempo-value" id="swing-val">0%</span>
          </div>
        </div>

        <!-- Step numbers -->
        <div class="seq-header" id="seq-header"></div>

        <!-- Grid generated by UI.js later -->
        <div class="sequencer-grid" id="sequencer-grid"></div>

        <div class="subgrid">
          <div class="effect-control">
            <div class="effect-label">
              <label for="humanize">Human</label>
              <span class="effect-value" id="humanize-val">0%</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="humanize-fill"></div>
              <input type="range" id="humanize" min="0" max="30" value="0" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="humanize-time">Timing</label>
              <span class="effect-value" id="humanize-time-val">0ms</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="humanize-time-fill"></div>
              <input type="range" id="humanize-time" min="0" max="20" value="0" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="scale-root">Root</label>
              <span class="effect-value" id="scale-root-val">A</span>
            </div>
            <div class="segmented" role="group" aria-label="Scale Root">
              <button type="button" class="seg-btn" data-root="C">C</button>
              <button type="button" class="seg-btn" data-root="D">D</button>
              <button type="button" class="seg-btn" data-root="E">E</button>
              <button type="button" class="seg-btn active" data-root="A">A</button>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- FX section (placeholders, actual DSP later) -->
    <section class="effects-section">
      <div class="section-header">
        <h2>FX</h2>
        <div class="presets-container">
          <button class="preset-btn active" data-fx-preset="JUNO" type="button">JUNO</button>
          <button class="preset-btn" data-fx-preset="DIRTY" type="button">DIRTY</button>
          <button class="preset-btn" data-fx-preset="CLEAN" type="button">CLEAN</button>
        </div>
      </div>

      <div class="section-content">
        <div class="effects-grid">

          <div class="effect-control">
            <div class="effect-label">
              <label for="chorusMix">Chorus</label>
              <span class="effect-value" id="chorusMix-val">45%</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="chorusMix-fill"></div>
              <input type="range" id="chorusMix" min="0" max="100" value="45" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="drive">Drive</label>
              <span class="effect-value" id="drive-val">12</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="drive-fill"></div>
              <input type="range" id="drive" min="0" max="100" value="12" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="crush">Crush</label>
              <span class="effect-value" id="crush-val">0</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="crush-fill"></div>
              <input type="range" id="crush" min="0" max="100" value="0" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="reverb">Reverb</label>
              <span class="effect-value" id="reverb-val">18%</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="reverb-fill"></div>
              <input type="range" id="reverb" min="0" max="100" value="18" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="comp">Comp</label>
              <span class="effect-value" id="comp-val">25</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="comp-fill"></div>
              <input type="range" id="comp" min="0" max="100" value="25" step="1" />
            </div>
          </div>

          <div class="effect-control">
            <div class="effect-label">
              <label for="mix">FX Mix</label>
              <span class="effect-value" id="mix-val">35%</span>
            </div>
            <div class="slider-container">
              <div class="slider-fill" id="mix-fill"></div>
              <input type="range" id="mix" min="0" max="100" value="35" step="1" />
            </div>
          </div>

        </div>
      </div>
    </section>

    <footer class="sampler-footer">
      <p>AKOMGA · WebAudio · Poly Synth · Minor Scale Seq</p>
    </footer>

  </div>

  <!-- Placeholder: you will add js/main.js later -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
