<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Juno Groovebox</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app">

<header>

<h1>JUNO GROOVEBOX</h1>

<div class="transport">

<button id="play">PLAY</button>
<button id="stop">STOP</button>

</div>

</header>


<section class="sequencer">

<div id="seq-grid"></div>

</section>


<section class="synth">

<label>Cutoff
<input id="cutoff" type="range" min="200" max="12000" value="8000">
</label>

<label>Res
<input id="res" type="range" min="0" max="1" step="0.01" value="0.3">
</label>

<label>Wave
<select id="wave">
<option value="sawtooth">SAW</option>
<option value="square">SQUARE</option>
<option value="triangle">TRI</option>
</select>
</label>

</section>


<section class="fx">

<label>Chorus
<input id="chorus" type="range" min="0" max="1" step="0.01" value="0.2">
</label>

<label>Drive
<input id="drive" type="range" min="0" max="1" step="0.01" value="0.1">
</label>

<label>Reverb
<input id="reverb" type="range" min="0" max="1" step="0.01" value="0.2">
</label>

</section>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
