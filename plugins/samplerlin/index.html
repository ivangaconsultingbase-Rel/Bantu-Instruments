<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMULLOTRON</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="emullotron">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="brand-name">EMULLOTRON</span>
        <span class="brand-version">MK2</span>
      </div>
      <div class="screen">
        <div class="screen-row">
          <span class="screen-label">BANK</span>
          <span class="screen-value" id="bank-name">---</span>
        </div>
        <div class="screen-row">
          <span class="screen-label">SAMPLE</span>
          <span class="screen-value" id="sample-name">NO FILE</span>
        </div>
        <div class="screen-row">
          <span class="screen-label">TAPE</span>
          <div class="tape-bar">
            <div class="tape-fill" id="tape-fill"></div>
          </div>
        </div>
      </div>
      <div class="status-leds">
        <div class="led" id="led-audio"></div>
        <div class="led" id="led-midi"></div>
      </div>
    </header>

    <!-- Bank Selector -->
    <section class="banks">
      <button class="bank-btn" data-bank="strings">
        <span class="bank-icon">◈</span>
        <span class="bank-label">STRINGS</span>
      </button>
      <button class="bank-btn" data-bank="flute">
        <span class="bank-icon">◇</span>
        <span class="bank-label">FLUTE</span>
      </button>
      <button class="bank-btn" data-bank="piano">
        <span class="bank-icon">▢</span>
        <span class="bank-label">PIANO</span>
      </button>
      <button class="bank-btn" data-bank="custom" id="custom-bank-btn">
        <span class="bank-icon">+</span>
        <span class="bank-label">CUSTOM</span>
      </button>
      <input type="file" id="file-input" accept="audio/*" hidden>
    </section>

    <!-- Main Controls -->
    <section class="controls">
      <div class="control-group">
        <span class="group-label">TAPE</span>
        <div class="control-row">
          <div class="encoder-container">
            <div class="encoder" data-param="tapeLength" data-min="2" data-max="12" data-value="8">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">LENGTH</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="wow" data-min="0" data-max="100" data-value="35">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">WOW</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="flutter" data-min="0" data-max="100" data-value="25">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">FLUTTER</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="tapeAge" data-min="0" data-max="100" data-value="40">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">AGE</span>
          </div>
        </div>
      </div>

      <div class="control-group">
        <span class="group-label">TONE</span>
        <div class="control-row">
          <div class="encoder-container">
            <div class="encoder" data-param="brightness" data-min="0" data-max="100" data-value="60">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">BRIGHT</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="saturation" data-min="0" data-max="100" data-value="30">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">DRIVE</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="attack" data-min="0" data-max="100" data-value="40">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">ATTACK</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="release" data-min="0" data-max="100" data-value="50">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">RELEASE</span>
          </div>
        </div>
      </div>

      <div class="control-group">
        <span class="group-label">CHARACTER</span>
        <div class="control-row">
          <div class="encoder-container">
            <div class="encoder" data-param="mechanicalNoise" data-min="0" data-max="100" data-value="20">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">NOISE</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="startJitter" data-min="0" data-max="100" data-value="30">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">JITTER</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="driftPerKey" data-min="0" data-max="100" data-value="25">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">DRIFT</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="masterVolume" data-min="0" data-max="1" data-value="0.7">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">VOLUME</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Preset Buttons -->
    <section class="presets">
      <span class="presets-label">PRESETS</span>
      <div class="preset-row">
        <button class="preset-btn" data-preset="pristine">PRISTINE</button>
        <button class="preset-btn" data-preset="vintage">VINTAGE</button>
        <button class="preset-btn" data-preset="worn">WORN</button>
        <button class="preset-btn" data-preset="broken">BROKEN</button>
        <button class="preset-btn" data-preset="dreamy">DREAMY</button>
      </div>
    </section>

    <!-- Keyboard -->
    <section class="keyboard-section">
      <div class="keyboard" id="keyboard"></div>
      <div class="keyboard-info">
        <span>OCTAVE: <span id="octave-display">4</span></span>
        <div class="octave-btns">
          <button class="octave-btn" id="oct-down">−</button>
          <button class="octave-btn" id="oct-up">+</button>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-left">
        <span id="voices-count">0</span> VOICES
      </div>
      <div class="footer-center">
        <span id="status-text">READY</span>
      </div>
      <div class="footer-right">
        <span id="midi-status">MIDI OFF</span>
      </div>
    </footer>
  </div>

  <script src="emullotron.js"></script>
</body>
</html>
