<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMULLOTRON</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="emullotron">
    <header class="header">
      <div class="brand">
        <span class="brand-name">EMULLOTRON</span>
        <span class="brand-version">MK2</span>
      </div>

      <div class="screen">
        <div class="screen-row">
          <span class="screen-label">BANK</span>
          <span class="screen-value" id="bank-name">---</span>
        </div>
        <div class="screen-row">
          <span class="screen-label">SAMPLE</span>
          <span class="screen-value" id="sample-name">NO FILE</span>
        </div>
        <div class="screen-row">
          <span class="screen-label">MODE</span>
          <span class="screen-value" id="mode-display">POLY · 1V · 1×</span>
        </div>
        <div class="screen-row">
          <span class="screen-label">TAPE</span>
          <div class="tape-bar">
            <div class="tape-fill" id="tape-fill"></div>
          </div>
        </div>
      </div>

      <div class="status-leds">
        <div class="led" id="led-audio"></div>
        <div class="led" id="led-midi"></div>
      </div>
    </header>

    <section class="banks">
      <button class="bank-btn" data-bank="strings">
        <span class="bank-icon">◈</span>
        <span class="bank-label">STRINGS</span>
      </button>
      <button class="bank-btn" data-bank="flute">
        <span class="bank-icon">◇</span>
        <span class="bank-label">FLUTE</span>
      </button>
      <button class="bank-btn" data-bank="piano">
        <span class="bank-icon">▢</span>
        <span class="bank-label">PIANO</span>
      </button>
      <button class="bank-btn" data-bank="custom" id="custom-bank-btn">
        <span class="bank-icon">+</span>
        <span class="bank-label">CUSTOM</span>
      </button>
      <input type="file" id="file-input" accept=".wav,.wave,.aif,.aiff,.mp3,.m4a,audio/*" hidden />
    </section>

    <section class="controls">
      <div class="control-group">
        <span class="group-label">TAPE</span>
        <div class="control-row">
          <div class="encoder-container">
            <div class="encoder" data-param="tapeLength" data-min="2" data-max="12" data-value="8">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">LENGTH</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="wow" data-min="0" data-max="100" data-value="35">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">WOW</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="flutter" data-min="0" data-max="100" data-value="25">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">FLUTTER</span>
          </div>
          <div class="encoder-container">
            <div class="encoder" data-param="masterVolume" data-min="0" data-max="1" data-value="0.7">
              <div class="encoder-ring"></div>
              <div class="encoder-indicator"></div>
            </div>
            <span class="encoder-label">VOLUME</span>
          </div>
        </div>
      </div>
    </section>

    <section class="mode-section">
      <div class="mode-row">
        <div class="mode-group">
          <span class="mode-group-label">ENSEMBLE</span>
          <div class="mode-btns">
            <button class="mode-btn active" data-ensemble="1">1V</button>
            <button class="mode-btn" data-ensemble="2">2V</button>
            <button class="mode-btn" data-ensemble="3">3V</button>
          </div>
        </div>

        <div class="mode-group">
          <span class="mode-group-label">SPEED</span>
          <div class="mode-btns">
            <button class="mode-btn" data-speed="0.5">½×</button>
            <button class="mode-btn active" data-speed="1">1×</button>
            <button class="mode-btn" data-speed="2">2×</button>
          </div>
        </div>

        <div class="mode-group">
          <span class="mode-group-label">MODE</span>
          <div class="mode-btns">
            <button class="mode-btn active" data-playmode="poly">POLY</button>
            <button class="mode-btn" data-playmode="arp">ARP</button>
          </div>
        </div>
      </div>
    </section>

    <section class="seq-section">
      <div class="seq-header">
        <span class="mode-group-label">STEP RECORDER</span>

        <div class="seq-transport">
          <button class="seq-btn" id="seq-rec">● REC</button>
          <button class="seq-btn" id="seq-play">▶ PLAY</button>
          <button class="seq-btn danger" id="seq-clear">✕ CLR</button>
        </div>

        <div class="mode-group">
          <span class="mode-group-label">BPM</span>
          <div class="bpm-ctrl">
            <button class="bpm-btn" id="seq-bpm-down">−</button>
            <span class="bpm-val" id="seq-bpm-val">120</span>
            <button class="bpm-btn" id="seq-bpm-up">+</button>
          </div>
        </div>
      </div>

      <div class="seq-grid" id="seq-grid"></div>
    </section>

    <section class="keyboard-section">
      <div class="keyboard" id="keyboard"></div>
      <div class="keyboard-info">
        <span>OCTAVE: <span id="octave-display">4</span></span>
        <div class="octave-btns">
          <button class="octave-btn" id="oct-down">−</button>
          <button class="octave-btn" id="oct-up">+</button>
        </div>
        <span id="arp-display" class="arp-display" style="display:none">ARP: <span id="arp-notes">--</span></span>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-left"><span id="voices-count">0</span> VOICES</div>
      <div class="footer-center"><span id="status-text">READY</span></div>
      <div class="footer-right"><span id="midi-status">MIDI OFF</span></div>
    </footer>
  </div>

  <script src="emullotron.js"></script>
</body>
</html>
