<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Spectral Coast 6</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar panel">
      <div>
        <div class="eyebrow">BANTU INSTRUMENTS</div>
        <h1>Spectral Coast 6</h1>
        <div class="subtitle">6 voix · Additive · West Coast · Resynth · Spectral · Granular · Moog · Tape</div>
      </div>
      <div class="top-actions">
        <button id="audioToggle" class="primary">Start Audio</button>
        <label class="select-wrap">
          <span>Preset</span>
          <select id="presetSelect"></select>
        </label>
      </div>
    </header>

    <section class="panel macros">
      <div class="section-title">Macros</div>
      <div class="control-grid control-grid-4">
        <div class="control slider-control"><label for="macroOrganic">Organic</label><input id="macroOrganic" data-param="macroOrganic" type="range" min="0" max="1" step="0.001" /><output></output></div>
        <div class="control slider-control"><label for="macroComplexity">Complexity</label><input id="macroComplexity" data-param="macroComplexity" type="range" min="0" max="1" step="0.001" /><output></output></div>
        <div class="control slider-control"><label for="macroFocus">Focus</label><input id="macroFocus" data-param="macroFocus" type="range" min="0" max="1" step="0.001" /><output></output></div>
        <div class="control slider-control"><label for="macroAge">Age</label><input id="macroAge" data-param="macroAge" type="range" min="0" max="1" step="0.001" /><output></output></div>
      </div>
    </section>

    <main class="sections">
      <section class="panel">
        <div class="section-title">Source</div>
        <div class="control-grid control-grid-4">
          <div class="control slider-control"><label for="harmonics">Harmonics</label><input id="harmonics" data-param="harmonics" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="tilt">Tilt</label><input id="tilt" data-param="tilt" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="inharmonic">Inharmonic</label><input id="inharmonic" data-param="inharmonic" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="drift">Drift</label><input id="drift" data-param="drift" type="range" min="0" max="1" step="0.001" /><output></output></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">Timbre</div>
        <div class="control-grid control-grid-4">
          <div class="control slider-control"><label for="fold">Fold</label><input id="fold" data-param="fold" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="index">Index</label><input id="index" data-param="index" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control select-control">
            <label for="model">Model</label>
            <select id="model" data-param="model">
              <option value="wood">Wood</option>
              <option value="bell">Bell</option>
              <option value="reed">Reed</option>
              <option value="voice">Voice</option>
              <option value="choir">Choir</option>
              <option value="glass">Glass</option>
              <option value="metal">Metal</option>
              <option value="organ">Organ</option>
            </select>
          </div>
          <div class="control slider-control"><label for="morph">Morph</label><input id="morph" data-param="morph" type="range" min="0" max="1" step="0.001" /><output></output></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">Spectra</div>
        <div class="control-grid control-grid-4">
          <div class="control slider-control"><label for="blur">Blur</label><input id="blur" data-param="blur" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="warp">Warp</label><input id="warp" data-param="warp" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="freeze">Freeze</label><input id="freeze" data-param="freeze" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="grain">Grain</label><input id="grain" data-param="grain" type="range" min="0" max="1" step="0.001" /><output></output></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">Tone</div>
        <div class="control-grid control-grid-4">
          <div class="control slider-control"><label for="cutoff">Cutoff</label><input id="cutoff" data-param="cutoff" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="resonance">Resonance</label><input id="resonance" data-param="resonance" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="drive">Drive</label><input id="drive" data-param="drive" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="envAmt">Env</label><input id="envAmt" data-param="envAmt" type="range" min="0" max="1" step="0.001" /><output></output></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">Age / Space</div>
        <div class="control-grid control-grid-4">
          <div class="control slider-control"><label for="tape">Tape</label><input id="tape" data-param="tape" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="lofi">LoFi</label><input id="lofi" data-param="lofi" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="echo">Echo</label><input id="echo" data-param="echo" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control"><label for="space">Space</label><input id="space" data-param="space" type="range" min="0" max="1" step="0.001" /><output></output></div>
        </div>
      </section>
    </main>

    <section class="panel options-grid">
      <div>
        <div class="section-title">Performance</div>
        <div class="mini-grid">
          <div class="control slider-control compact"><label for="attack">Attack</label><input id="attack" data-param="attack" type="range" min="0.001" max="2" step="0.001" /><output></output></div>
          <div class="control slider-control compact"><label for="release">Release</label><input id="release" data-param="release" type="range" min="0.03" max="6" step="0.001" /><output></output></div>
          <div class="control slider-control compact"><label for="master">Master</label><input id="master" data-param="master" type="range" min="0" max="1" step="0.001" /><output></output></div>
          <div class="control slider-control compact"><label for="velocityDepth">Velocity</label><input id="velocityDepth" data-param="velocityDepth" type="range" min="0" max="1" step="0.001" /><output></output></div>
        </div>
      </div>
      <div>
        <div class="section-title">Keyboard</div>
        <div class="key-help">Clavier ordinateur: A W S E D F T G Y H U J K · Z/X pour changer d’octave.</div>
        <div class="row-inline">
          <button id="panicBtn">Panic</button>
          <label class="select-wrap small"><span>Octave</span><select id="octaveShift"><option value="-1">-1</option><option value="0" selected>0</option><option value="1">+1</option><option value="2">+2</option></select></label>
        </div>
      </div>
    </section>

    <section class="panel keyboard-panel">
      <div class="section-title">Keyboard</div>
      <div id="keyboard" class="keyboard"></div>
    </section>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
