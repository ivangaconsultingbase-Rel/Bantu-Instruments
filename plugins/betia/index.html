<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>DR-4 V3.2 — Drum Modeling Box</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap');

  :root{
    --bg:#080808;
    --panel:#141414;
    --panel2:#1b1b1b;
    --panel3:#242424;
    --line:#323232;
    --line2:#474747;
    --txt:#f2f2f2;
    --mut:#9a9a9a;
    --acc:#d93636;
    --acc2:#ff6f6f;
    --acc3:#8d1c1c;
    --ok:#7cde8d;
    --warn:#f3c76b;
    --radius:14px;
    --mono:'Share Tech Mono', ui-monospace, monospace;
    --ui:'Rajdhani', system-ui, sans-serif;
    --shadow:0 12px 28px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(circle at top, rgba(217,54,54,.08), transparent 30%),
      linear-gradient(180deg,#0a0a0a,#070707);
    color:var(--txt);
    font-family:var(--ui);
    -webkit-tap-highlight-color:transparent;
  }

  .app{
    max-width:1480px;
    margin:0 auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .panel{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:12px;
  }

  .top{
    display:grid;
    grid-template-columns:1.2fr 1fr 1fr;
    gap:12px;
  }

  .brand{
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:center;
  }

  .title h1{
    margin:0;
    line-height:1;
    letter-spacing:.08em;
    font-size:28px;
  }
  .title .sub{
    margin-top:6px;
    color:var(--mut);
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.12em;
  }

  .ledRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .led{
    min-width:96px;
    background:linear-gradient(180deg,#111,#0d0d0d);
    border:1px solid var(--line2);
    border-radius:10px;
    padding:8px 10px;
  }
  .led .k{
    font-size:11px;
    color:var(--mut);
    text-transform:uppercase;
    letter-spacing:.1em;
  }
  .led .v{
    margin-top:3px;
    font-family:var(--mono);
    font-size:16px;
  }
  .v.on{color:var(--ok)}
  .v.warn{color:var(--warn)}

  .row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }

  button, select{
    font:inherit;
    color:var(--txt);
    background:linear-gradient(180deg,#222,#171717);
    border:1px solid var(--line2);
    border-radius:10px;
    padding:10px 12px;
    cursor:pointer;
  }
  button:hover, select:hover{border-color:#626262}
  button:active{transform:translateY(1px)}
  .btnAcc{
    background:linear-gradient(180deg,var(--acc2),var(--acc3));
    border-color:#8d1d1d;
  }
  .btnGhost{
    background:linear-gradient(180deg,#1f1f1f,#151515);
  }
  .btnSmall{
    padding:7px 10px;
    min-height:36px;
    font-size:13px;
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:92px;
  }
  .field label{
    font-size:11px;
    color:var(--mut);
    text-transform:uppercase;
    letter-spacing:.08em;
  }

  input[type="range"]{
    appearance:none;
    width:100%;
    height:34px;
    background:transparent;
    margin:0;
  }
  input[type="range"]::-webkit-slider-runnable-track{
    height:7px;
    border-radius:999px;
    background:linear-gradient(90deg,#292929,#484848);
    border:1px solid #555;
  }
  input[type="range"]::-webkit-slider-thumb{
    appearance:none;
    width:18px;height:18px;
    margin-top:-6px;
    border-radius:50%;
    background:linear-gradient(180deg,var(--acc2),var(--acc3));
    border:1px solid #871616;
  }

  .smallVal{
    font-family:var(--mono);
    color:#ffc0c0;
    font-size:12px;
    text-align:right;
    min-height:14px;
  }

  .blockTitle{
    font-size:11px;
    color:var(--mut);
    text-transform:uppercase;
    letter-spacing:.12em;
    margin-bottom:7px;
  }

  .paramGrid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
  }
  .paramGrid6{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
  }

  .tracks{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
  }
  .track{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .trackHead{
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .trackName{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .trackName h2{
    margin:0;
    font-size:20px;
    letter-spacing:.06em;
  }
  .badge{
    font-size:11px;
    letter-spacing:.09em;
    text-transform:uppercase;
    color:#ffd9d9;
    border:1px solid #6f2a2a;
    padding:3px 7px;
    border-radius:999px;
    background:rgba(217,54,54,.12);
  }

  .vuWrap{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .vu{
    width:86px;
    height:9px;
    border-radius:999px;
    overflow:hidden;
    border:1px solid #363636;
    background:#101010;
  }
  .vuBar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#1ed760,#f6db3d,#ff3434);
    transition:width .05s linear;
  }
  .vuTxt{
    font-size:11px;
    color:var(--mut);
    font-family:var(--mono);
    min-width:34px;
    text-align:right;
  }

  .mini{
    background:linear-gradient(180deg,var(--panel3),#1a1a1a);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px;
  }

  .sequencer{
    display:grid;
    grid-template-columns:1.25fr .75fr;
    gap:12px;
  }

  .seqHeader{
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:10px;
  }

  .tabs{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .legend{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    font-size:12px;
    color:var(--mut);
  }

  .stepGrid{
    display:grid;
    grid-template-columns:repeat(16,1fr);
    gap:6px;
  }

  .step{
    border:1px solid var(--line2);
    background:linear-gradient(180deg,#1d1d1d,#121212);
    border-radius:10px;
    padding:6px 5px;
    display:flex;
    flex-direction:column;
    gap:5px;
    min-width:0;
  }
  .step.on{
    background:linear-gradient(180deg,rgba(217,54,54,.22),rgba(90,18,18,.18)), linear-gradient(180deg,#231313,#121212);
  }
  .step.playing{
    border-color:#ffd9a3;
    box-shadow:0 0 0 1px rgba(240,194,102,.55) inset, 0 0 14px rgba(240,194,102,.22);
  }
  .step.selected{
    outline:2px solid rgba(255,103,103,.75);
  }
  .step .n{
    text-align:center;
    color:var(--mut);
    font-size:10px;
    font-family:var(--mono);
  }
  .tinyCenter{
    text-align:center;
    font-size:10px;
    color:#ffb8b8;
    font-family:var(--mono);
  }

  .editorGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
  }

  .footer{
    color:var(--mut);
    text-align:center;
    font-size:12px;
    padding:2px 0 10px;
  }

  @media (max-width:1100px){
    .top{grid-template-columns:1fr}
    .tracks{grid-template-columns:1fr}
    .sequencer{grid-template-columns:1fr}
  }
  @media (max-width:760px){
    .app{padding:10px}
    .paramGrid,.paramGrid6,.editorGrid{grid-template-columns:repeat(2,1fr)}
    .stepGrid{grid-template-columns:repeat(8,1fr)}
    .title h1{font-size:22px}
  }
</style>
</head>
<body>
<div class="app">

  <section class="top">
    <div class="panel brand">
      <div class="title">
        <h1>DR-4 V3.2</h1>
        <div class="sub">Drum modeling box · recalibrated levels and character</div>
      </div>
      <div class="ledRow">
        <div class="led"><div class="k">Audio</div><div class="v" id="audioState">OFF</div></div>
        <div class="led"><div class="k">Transport</div><div class="v" id="playState">STOP</div></div>
        <div class="led"><div class="k">Step</div><div class="v" id="stepDisplay">--</div></div>
      </div>
    </div>

    <div class="panel">
      <div class="blockTitle">Transport</div>
      <div class="row" style="margin-bottom:8px">
        <button id="audioBtn" class="btnAcc">Audio On</button>
        <button id="playBtn" class="btnGhost">Play</button>
        <button id="rndBtn" class="btnGhost">Random</button>
        <button id="clearBtn" class="btnGhost">Clear</button>
      </div>
      <div class="row">
        <div class="field">
          <label>BPM</label>
          <input id="bpm" type="range" min="50" max="180" step="1" value="122">
        </div>
        <div class="field">
          <label>Swing</label>
          <input id="swing" type="range" min="0" max="0.35" step="0.001" value="0.03">
        </div>
        <div class="field">
          <label>Accent Amt</label>
          <input id="accentAmt" type="range" min="0" max="1" step="0.001" value="0.32">
        </div>
        <div class="field">
          <label>Master Vol</label>
          <input id="masterVol" type="range" min="0" max="1.2" step="0.001" value="0.9">
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="blockTitle">Pattern / Master</div>
      <div class="row" style="margin-bottom:8px">
        <button id="patA" class="btnAcc">Pattern A</button>
        <button id="patB" class="btnGhost">Pattern B</button>
        <button id="copyAToB" class="btnGhost">Copy A → B</button>
        <button id="copyBToA" class="btnGhost">Copy B → A</button>
      </div>
      <div class="paramGrid">
        <div class="field"><label>Saturation</label><input id="masterDrive" type="range" min="0" max="1" step="0.001" value="0.18"></div>
        <div class="field"><label>Tone</label><input id="masterTone" type="range" min="300" max="12000" step="1" value="7600"></div>
        <div class="field"><label>Comp</label><input id="masterComp" type="range" min="0" max="1" step="0.001" value="0.45"></div>
        <div class="field">
          <label>Master VU</label>
          <div class="vuWrap" style="margin-top:9px">
            <div class="vu"><div class="vuBar" id="vu-master"></div></div>
            <div class="vuTxt" id="vu-master-txt">0%</div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="tracks" id="tracks"></section>

  <section class="sequencer">
    <div class="panel">
      <div class="seqHeader">
        <div>
          <div class="blockTitle">Sequencer</div>
          <div class="legend">
            <span>Trig</span>
            <span>Vel</span>
            <span>Prob</span>
            <span>µT</span>
            <span>Accent</span>
            <span>Locks XYZT</span>
          </div>
        </div>
        <div class="tabs" id="trackTabs"></div>
      </div>
      <div class="stepGrid" id="stepGrid"></div>
    </div>

    <div class="panel">
      <div class="blockTitle">Step Editor</div>
      <div id="stepEditor"></div>
    </div>
  </section>

  <div class="footer">
    DR-4 V3.2 Web — recalibrated kicks, snares, hats and metallic percussion.
  </div>
</div>

<script>
(() => {
  const TRACK_DEFS = [
    {
      id:'kick', name:'Kick', badge:'BD',
      models:['Drive BD','Punch BD','Sub BD'],
      defaults:{model:'Drive BD',x:0.38,y:0.30,z:0.42,t:0.52,pitch:0.34,decay:0.30,curve:0.53,level:0.95,pan:0,tune:0}
    },
    {
      id:'snare', name:'Snare', badge:'SD',
      models:['Tone+Noise','Clap','Snap'],
      defaults:{model:'Tone+Noise',x:0.43,y:0.56,z:0.55,t:0.36,pitch:0.46,decay:0.26,curve:0.48,level:0.78,pan:-0.05,tune:0}
    },
    {
      id:'hat', name:'Hat / Cym', badge:'HH',
      models:['Closed Hat','Open Hat','Ride'],
      defaults:{model:'Closed Hat',x:0.66,y:0.42,z:0.48,t:0.32,pitch:0.58,decay:0.14,curve:0.62,level:0.62,pan:0.08,tune:0}
    },
    {
      id:'perc', name:'Perc / Bell', badge:'PR',
      models:['Cowbell','Clave','Metal Perc'],
      defaults:{model:'Cowbell',x:0.52,y:0.35,z:0.44,t:0.22,pitch:0.50,decay:0.28,curve:0.56,level:0.70,pan:0.12,tune:0}
    }
  ];

  const STEPS = 16;
  const floorGain = 0.00015;

  const state = {
    bpm:122,
    swing:0.03,
    accentAmt:0.32,
    masterVol:0.9,
    masterDrive:0.18,
    masterTone:7600,
    masterComp:0.45,
    currentPattern:'A',
    selectedTrack:0,
    selectedStep:0,
    patterns:{
      A:createPattern(),
      B:createPattern()
    }
  };

  function createStep(i){
    return {
      on:false,
      vel:(i % 4 === 0 ? 1 : 0.78),
      prob:1,
      micro:0,
      accent:0,
      lockOn:false,
      lockX:0.5,
      lockY:0.5,
      lockZ:0.5,
      lockT:0.5
    };
  }

  function createPattern(){
    return {
      tracks: TRACK_DEFS.map(def => ({
        ...structuredClone(def.defaults),
        mute:false,
        steps:Array.from({length:STEPS}, (_,i)=>createStep(i))
      }))
    };
  }

  function pattern(){ return state.patterns[state.currentPattern]; }
  function tracks(){ return pattern().tracks; }
  function track(ti){ return tracks()[ti]; }
  function stepObj(ti,si){ return track(ti).steps[si]; }

  let ctx = null;
  let noiseBuffer = null;
  let masterIn, masterDrive, masterTone, comp, limiter, masterGain, masterAnalyser;
  let trackChains = [];
  let lastOpenHatVca = null;

  let isPlaying = false;
  let currentStep = 0;
  let nextNoteTime = 0;
  let schedulerId = null;

  const scheduleAheadTime = 0.10;
  const lookaheadMs = 25;

  const tracksWrap = document.getElementById('tracks');
  const trackTabs = document.getElementById('trackTabs');
  const stepGrid = document.getElementById('stepGrid');
  const stepEditor = document.getElementById('stepEditor');

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function expMap01(v,min,max){ return min * Math.pow(max/min, clamp(v,0,1)); }
  function safe01(v, fallback=0.5){ return Number.isFinite(v) ? clamp(v,0,1) : fallback; }

  function setLed(id,text,cls=''){
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'v ' + cls;
  }

  function curveBlend(curve,x){
    x = clamp(x,0,1);
    const types = [
      x => 1-x,
      x => Math.pow(1-x,2),
      x => Math.exp(-5*x),
      x => Math.pow(1/(1+5*x),2),
      x => 1/(1+5*x)
    ];
    const pos = clamp(curve,0,1) * 4;
    const i = Math.floor(pos);
    const f = pos - i;
    if(i >= 4) return types[4](x);
    return lerp(types[i](x), types[i+1](x), f);
  }

  function curveName(v){
    if(v < .125) return 'Linear';
    if(v < .375) return 'Sq Linear';
    if(v < .625) return 'Exp';
    if(v < .875) return 'Sq Reciprocal';
    return 'Reciprocal';
  }

  function distortionCurve(amount=50){
    const n = 2048;
    const curve = new Float32Array(n);
    const k = amount * 70 + 1;
    for(let i=0;i<n;i++){
      const x = i * 2 / n - 1;
      curve[i] = ((1+k)*x)/(1+k*Math.abs(x));
    }
    return curve;
  }

  function softClipCurve(amount=0.5){
    const n = 2048;
    const curve = new Float32Array(n);
    const a = 1 + amount * 8;
    for(let i=0;i<n;i++){
      const x = i * 2 / n - 1;
      curve[i] = Math.tanh(a*x)/Math.tanh(a);
    }
    return curve;
  }

  function createNoiseBuffer(context){
    const len = context.sampleRate * 2;
    const buf = context.createBuffer(1, len, context.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = Math.random()*2 - 1;
    return buf;
  }

  function buildTrackChains(){
    trackChains = TRACK_DEFS.map(() => {
      const input = ctx.createGain();
      const voiceComp = ctx.createDynamicsCompressor();
      voiceComp.threshold.value = -8;
      voiceComp.knee.value = 8;
      voiceComp.ratio.value = 8;
      voiceComp.attack.value = 0.002;
      voiceComp.release.value = 0.05;

      const analyser = ctx.createAnalyser();
      analyser.fftSize = 256;

      input.connect(voiceComp);
      voiceComp.connect(analyser);
      analyser.connect(masterIn);

      return {input, analyser};
    });
  }

  async function ensureAudio(){
    if(!ctx){
      ctx = new (window.AudioContext || window.webkitAudioContext)({latencyHint:'interactive'});
      noiseBuffer = createNoiseBuffer(ctx);

      masterIn = ctx.createGain();

      masterDrive = ctx.createWaveShaper();
      masterDrive.curve = softClipCurve(state.masterDrive);
      masterDrive.oversample = '4x';

      masterTone = ctx.createBiquadFilter();
      masterTone.type = 'lowpass';
      masterTone.frequency.value = state.masterTone;
      masterTone.Q.value = 0.2;

      comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -24;
      comp.knee.value = 18;
      comp.ratio.value = 8;
      comp.attack.value = 0.002;
      comp.release.value = 0.14;

      limiter = ctx.createDynamicsCompressor();
      limiter.threshold.value = -3;
      limiter.knee.value = 0;
      limiter.ratio.value = 20;
      limiter.attack.value = 0.001;
      limiter.release.value = 0.09;

      masterAnalyser = ctx.createAnalyser();
      masterAnalyser.fftSize = 256;

      masterGain = ctx.createGain();
      masterGain.gain.value = state.masterVol;

      buildTrackChains();

      masterIn.connect(masterDrive);
      masterDrive.connect(masterTone);
      masterTone.connect(comp);
      comp.connect(limiter);
      limiter.connect(masterAnalyser);
      masterAnalyser.connect(masterGain);
      masterGain.connect(ctx.destination);

      updateMasterFX();
      startMeters();
    }

    if(ctx.state !== 'running') await ctx.resume();
    setLed('audioState','ON','on');
  }

  function updateMasterFX(){
    if(!ctx) return;
    masterDrive.curve = softClipCurve(state.masterDrive);
    masterTone.frequency.setTargetAtTime(state.masterTone, ctx.currentTime, 0.01);

    const c = state.masterComp;
    comp.threshold.setTargetAtTime(lerp(-8,-30,c), ctx.currentTime, 0.01);
    comp.ratio.setTargetAtTime(lerp(2,12,c), ctx.currentTime, 0.01);
    comp.knee.setTargetAtTime(lerp(6,24,c), ctx.currentTime, 0.01);
    masterGain.gain.setTargetAtTime(state.masterVol, ctx.currentTime, 0.01);
  }

  function formatValue(param,v){
    switch(param){
      case 'decay': return Number(v).toFixed(3) + ' s';
      case 'tune': return Number(v).toFixed(1) + ' st';
      case 'curve': return curveName(v);
      default: return Number(v).toFixed(2);
    }
  }

  function sliderHTML(ti, param, label, min, max, step, value){
    return `
      <div class="field">
        <label>${label}</label>
        <input data-track="${ti}" data-param="${param}" type="range" min="${min}" max="${max}" step="${step}" value="${value}">
        <div class="smallVal" id="val-${ti}-${param}">${formatValue(param,value)}</div>
      </div>
    `;
  }

  function renderTracks(){
    tracksWrap.innerHTML = '';
    trackTabs.innerHTML = '';

    TRACK_DEFS.forEach((def, ti) => {
      const t = track(ti);
      const panel = document.createElement('section');
      panel.className = 'panel track';
      panel.innerHTML = `
        <div class="trackHead">
          <div class="trackName">
            <h2>${def.name}</h2>
            <span class="badge">${def.badge}</span>
            <div class="vuWrap">
              <div class="vu"><div class="vuBar" id="vu-${ti}"></div></div>
              <div class="vuTxt" id="vuTxt-${ti}">0%</div>
            </div>
          </div>
          <div class="field" style="min-width:180px">
            <label>Model</label>
            <select data-track="${ti}" data-param="model">
              ${def.models.map(m => `<option ${m===t.model?'selected':''}>${m}</option>`).join('')}
            </select>
          </div>
        </div>

        <div class="mini">
          <div class="blockTitle">Core XYZT</div>
          <div class="paramGrid">
            ${sliderHTML(ti,'x','X',0,1,0.001,t.x)}
            ${sliderHTML(ti,'y','Y',0,1,0.001,t.y)}
            ${sliderHTML(ti,'z','Z',0,1,0.001,t.z)}
            ${sliderHTML(ti,'t','T',0,1,0.001,t.t)}
          </div>
        </div>

        <div class="mini">
          <div class="blockTitle">Pitch / Envelope</div>
          <div class="paramGrid">

  function bindTrackControls(){
    document.querySelectorAll('[data-track][data-param]').forEach(el => {
      const ti = +el.dataset.track;
      const param = el.dataset.param;
      const isSelect = el.tagName === 'SELECT';
      const handler = () => {
        const val = isSelect ? el.value : +el.value;
        track(ti)[param] = val;
        const out = document.getElementById(`val-${ti}-${param}`);
        if(out) out.textContent = formatValue(param,val);
      };
      el.addEventListener('input', handler);
      el.addEventListener('change', handler);
    });

    document.querySelectorAll('[data-preview]').forEach(btn => {
      btn.onclick = async () => {
        await ensureAudio();
        try{
          triggerTrack(+btn.dataset.preview, ctx.currentTime, 1, null);
        }catch(err){
          console.error('Preview error', err);
        }
      };
    });

    document.querySelectorAll('[data-randtrack]').forEach(btn => {
      btn.onclick = () => {
        randomizeTrack(+btn.dataset.randtrack);
        renderTracks();
        renderStepGrid();
        renderStepEditor();
      };
    });

    document.querySelectorAll('[data-filltrack]').forEach(btn => {
      btn.onclick = () => {
        fillTrack(+btn.dataset.filltrack);
        renderStepGrid();
        renderStepEditor();
      };
    });

    document.querySelectorAll('[data-mute]').forEach(btn => {
      btn.onclick = () => {
        const t = track(+btn.dataset.mute);
        t.mute = !t.mute;
        btn.textContent = t.mute ? 'Muted' : 'On';
      };
    });
  }

  function renderStepGrid(){
    stepGrid.innerHTML = '';
    const ti = state.selectedTrack;

    for(let i=0;i<STEPS;i++){
      const s = stepObj(ti,i);
      const el = document.createElement('div');
      el.className =
        'step'
        + (s.on ? ' on' : '')
        + (i === state.selectedStep ? ' selected' : '')
        + (i === currentStep && isPlaying ? ' playing' : '');

      el.innerHTML = `
        <div class="n">${String(i+1).padStart(2,'0')}</div>
        <button class="${s.on?'btnAcc':'btnGhost'} btnSmall">Trig</button>
        <div class="tinyCenter">A:${s.accent.toFixed(2)}</div>
        <div class="tinyCenter">${s.lockOn ? 'LOCK' : '--'}</div>
      `;

      el.querySelector('button').onclick = (ev) => {
        ev.stopPropagation();
        s.on = !s.on;
        renderStepGrid();
      };

      el.onclick = () => {
        state.selectedStep = i;
        renderStepGrid();
        renderStepEditor();
      };

      stepGrid.appendChild(el);
    }
  }

  function randomizeTrack(ti){
    const t = track(ti);
    const defs = TRACK_DEFS[ti];

    t.model = defs.models[(Math.random()*defs.models.length)|0];
    t.x = Math.random();
    t.y = Math.random();
    t.z = Math.random();
    t.t = Math.random();
    t.pitch = Math.random();
    t.decay = 0.04 + Math.random()*0.60;
    t.curve = Math.random();
    t.tune = -6 + Math.random()*12;

    t.steps.forEach((s, i) => {
      const base =
        ti===0 ? (i%4===0 ? 0.95 : (i===7||i===10 ? 0.35 : 0.05)) :
        ti===1 ? ((i===4||i===12) ? 0.90 : (i===15 ? 0.35 : 0.08)) :
        ti===2 ? (i%2===1 ? 0.72 : 0.22) :
                 ((i===3||i===11) ? 0.60 : 0.18);

      s.on = Math.random() < base;
      s.vel = clamp(0.5 + Math.random()*0.55, 0.1, 1.2);
      s.prob = clamp(0.55 + Math.random()*0.45, 0, 1);
      s.micro = clamp(Math.random()*0.04 - 0.02, -0.04, 0.04);
      s.accent = Math.random() < 0.25 ? Math.random() : 0;
      s.lockOn = Math.random() < 0.18;
      if(s.lockOn){
        s.lockX = Math.random();
        s.lockY = Math.random();
        s.lockZ = Math.random();
        s.lockT = Math.random();
      }
    });
  }

  function fillTrack(ti){
    const t = track(ti);
    t.steps.forEach((s,i) => {
      if(ti===0){
        s.on = (i%4===0 || i===10);
        s.vel = i%4===0 ? 1.0 : 0.76;
        s.accent = i%8===0 ? 0.8 : 0.18;
      }else if(ti===1){
        s.on = (i===4 || i===12);
        s.vel = 0.92;
        s.accent = 0.45;
      }else if(ti===2){
        s.on = (i%2===1);
        s.vel = 0.66 + ((i%4===3) ? 0.16 : 0);
        s.accent = i%4===3 ? 0.38 : 0.10;
      }else{
        s.on = (i===3 || i===11);
        s.vel = 0.82;
        s.accent = 0.24;
      }
      s.prob = 1;
      s.micro = 0;
      s.lockOn = false;
      s.lockX = 0.5;
      s.lockY = 0.5;
      s.lockZ = 0.5;
      s.lockT = 0.5;
    });
  }

  function createTrackOut(ti, level=0.8, pan=0){
    const gain = ctx.createGain();
    gain.gain.value = Math.max(floorGain, level);

    const panner = ctx.createStereoPanner();
    panner.pan.value = clamp(pan, -1, 1);

    gain.connect(panner);
    panner.connect(trackChains[ti].input);

    return {input:gain};
  }

  function scheduleAutomationCurve(param, startTime, duration, baseValue, amount, curve, minValue=10){
    const points = 48;
    const arr = new Float32Array(points);

    for(let i=0;i<points;i++){
      const env = curveBlend(curve, i/(points-1));
      arr[i] = Math.max(minValue, baseValue + amount * env);
    }

    param.cancelScheduledValues(startTime);
    param.setValueAtTime(arr[0], startTime);
    param.setValueCurveAtTime(arr, startTime, Math.max(duration, 0.002));
  }

  function applyAmpEnv(gainParam, time, decay, curve, peak=1){
    const dur = Math.max(0.008, decay);
    const pts = 64;
    const vals = new Float32Array(pts);

    for(let i=0;i<pts;i++){
      const v = peak * curveBlend(curve, i/(pts-1));
      vals[i] = Math.max(floorGain, v);
    }

    gainParam.cancelScheduledValues(time);
    gainParam.setValueAtTime(vals[0], time);
    gainParam.setValueCurveAtTime(vals, time, dur);
    gainParam.setValueAtTime(floorGain, time + dur + 0.002);
  }

  function noiseSource(time, duration=0.2){
    const src = ctx.createBufferSource();
    src.buffer = noiseBuffer;
    src.start(time);
    src.stop(time + duration + 0.05);
    return src;
  }

  function makeMetallicOscBank(count, baseFreq, ratios, type='square'){
    const sum = ctx.createGain();
    sum.gain.value = 1 / Math.sqrt(Math.max(1, count));
    const oscs = [];

    for(let i=0;i<count;i++){
      const o = ctx.createOscillator();
      o.type = type;
      o.frequency.value = Math.max(10, baseFreq * ratios[i]);
      o.connect(sum);
      oscs.push(o);
    }
    return {sum, oscs};
  }

  function resolvedParams(t, s){
    return {
      x: s?.lockOn ? safe01(s.lockX, t.x) : safe01(t.x, 0.5),
      y: s?.lockOn ? safe01(s.lockY, t.y) : safe01(t.y, 0.5),
      z: s?.lockOn ? safe01(s.lockZ, t.z) : safe01(t.z, 0.5),
      t: s?.lockOn ? safe01(s.lockT, t.t) : safe01(t.t, 0.5)
    };
  }

  function velocityWithAccent(vel, accent){
    const v = Number.isFinite(vel) ? vel : 0.8;
    const a = Number.isFinite(accent) ? accent : 0;
    return v * (1 + state.accentAmt * a);
  }

  function safeTrackDecay(t, min=0.04){
    return Math.max(min, t.decay);
  }

  function triggerTrack(ti, time, velocity=1, s=null){
    const t = track(ti);
    if(t.mute) return;
    switch(TRACK_DEFS[ti].id){
      case 'kick': triggerKick(ti, t, s, time, velocity); break;
      case 'snare': triggerSnare(ti, t, s, time, velocity); break;
      case 'hat': triggerHat(ti, t, s, time, velocity); break;
      case 'perc': triggerPerc(ti, t, s, time, velocity); break;
    }
  }

  function triggerKick(ti, t, s, time, vel){
    const p = resolvedParams(t,s);
    const model = t.model;
    const out = createTrackOut(ti, t.level * vel * (model === 'Punch BD' ? 1.10 : model === 'Sub BD' ? 1.05 : 1.0), t.pan);

    const basePitch = expMap01(clamp(t.pitch,0,1), 40, 92) * Math.pow(2, t.tune/12);
    const ampDecay = clamp(safeTrackDecay(t,0.05), 0.05, 1);
    const pitchDecay = clamp(0.02 + ampDecay * lerp(0.25,0.95,p.y), 0.02, 0.85);
    const curve = t.curve;

    if(model === 'Drive BD'){
      const osc = ctx.createOscillator();
      osc.type = 'sine';

      const cleanGain = ctx.createGain();
      const dirtySend = ctx.createGain();
      const sum = ctx.createGain();

      const dist1 = ctx.createWaveShaper();
      dist1.curve = distortionCurve(0.35 + p.z * 1.10);
      dist1.oversample = '4x';

      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = expMap01(p.x, 120, 2400);
      bp.Q.value = lerp(0.4, 9.0, p.y);

      const dist2 = ctx.createWaveShaper();
      dist2.curve = softClipCurve(0.16 + p.z * 0.58);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const kickStart = basePitch;
      const kickEnvAmt = basePitch * (3.2 * lerp(0.40,1,t.pitch));

      scheduleAutomationCurve(osc.frequency, time, pitchDecay, kickStart, kickEnvAmt, curve, 20);
      osc.frequency.setTargetAtTime(kickStart, time + pitchDecay * 0.68, 0.02);

      cleanGain.gain.value = 1 - (p.t * 0.82);
      dirtySend.gain.value = 0.28 + p.t * 1.05;

      osc.connect(cleanGain);
      osc.connect(dirtySend);
      dirtySend.connect(dist1);
      dist1.connect(bp);
      bp.connect(dist2);
      cleanGain.connect(sum);
      dist2.connect(sum);
      sum.connect(amp);
      amp.connect(out.input);

      applyAmpEnv(amp.gain, time, 0.08 + ampDecay * 0.92, curve, 1.10);

      osc.start(time);
      osc.stop(time + Math.max(0.18, ampDecay + 0.25));
    }

    else if(model === 'Punch BD'){
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      osc1.type='sine';
      osc2.type='triangle';

      const mix = ctx.createGain();
      const shaper = ctx.createWaveShaper();
      shaper.curve = softClipCurve(0.22 + p.z * 0.60);

      const lp = ctx.createBiquadFilter();
      lp.type='lowpass';
      lp.frequency.value = expMap01(p.x, 450, 7000);
      lp.Q.value = lerp(0.15,1.4,p.y);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const clickNoise = noiseSource(time,0.028);
      const clickHP = ctx.createBiquadFilter();
      clickHP.type='highpass';
      clickHP.frequency.value = expMap01(p.t,1400,7800);
      const clickGain = ctx.createGain();
      clickGain.gain.value = 0.04 + p.t*0.20;

      const f1 = basePitch*1.05;
      const f2 = basePitch*1.95;

      scheduleAutomationCurve(osc1.frequency, time, 0.03 + ampDecay*0.36, f1, f1*2.2, curve, 18);
      scheduleAutomationCurve(osc2.frequency, time, 0.02 + ampDecay*0.20, f2*0.50, f2*1.05, curve, 18);

      osc1.frequency.setTargetAtTime(f1, time+0.03, 0.02);
      osc2.frequency.setTargetAtTime(f2*0.50, time+0.02, 0.02);

      mix.gain.value = 0.75;
      osc1.connect(mix);
      osc2.connect(mix);
      mix.connect(shaper);
      shaper.connect(lp);
      lp.connect(amp);
      amp.connect(out.input);

      clickNoise.connect(clickHP);
      clickHP.connect(clickGain);
      clickGain.connect(out.input);

      applyAmpEnv(amp.gain,time,0.06+ampDecay*0.78,curve,1.08);

      osc1.start(time);
      osc2.start(time);
      osc1.stop(time+1.0);
      osc2.stop(time+1.0);
    }

    else{
      const osc = ctx.createOscillator();
      const sub = ctx.createOscillator();
      osc.type='sine';
      sub.type='sine';

      const mix = ctx.createGain();
      const lp = ctx.createBiquadFilter();
      lp.type='lowpass';
      lp.frequency.value = expMap01(p.x, 260, 1500);

      const bodyShaper = ctx.createWaveShaper();
      bodyShaper.curve = softClipCurve(0.08 + p.z * 0.24);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const f = expMap01(t.pitch, 30, 60) * Math.pow(2,t.tune/12);

      osc.frequency.setValueAtTime(f*1.4, time);
      sub.frequency.setValueAtTime(f*0.50, time);

      scheduleAutomationCurve(osc.frequency, time, 0.04 + ampDecay*0.52, f, f*0.95, curve, 18);
      osc.frequency.setTargetAtTime(f, time+0.05, 0.03);

      mix.gain.value = 1.0;
      osc.connect(mix);
      sub.connect(mix);
      mix.connect(lp);
      lp.connect(bodyShaper);
      bodyShaper.connect(amp);
      amp.connect(out.input);

      applyAmpEnv(amp.gain,time,0.16+ampDecay*1.02,curve,1.05);

      osc.start(time);
      sub.start(time);
      osc.stop(time+1.5);
      sub.stop(time+1.5);
    }
  }

  function triggerSnare(ti, t, s, time, vel){
    const p = resolvedParams(t,s);
    const model = t.model;
    const out = createTrackOut(ti, t.level * vel * (model === 'Snap' ? 1.08 : 1.0), t.pan);
    const curve = t.curve;
    const ampDecay = clamp(safeTrackDecay(t,0.05),0.05,1);

    if(model === 'Tone+Noise'){
      const osc = ctx.createOscillator();
      osc.type='triangle';

      const toneGain = ctx.createGain();
      const toneBP = ctx.createBiquadFilter();
      toneBP.type='bandpass';
      toneBP.frequency.value = expMap01(p.x, 190, 1100);
      toneBP.Q.value = lerp(0.3, 2.8, p.y);

      const noise = noiseSource(time, ampDecay + 0.18);
      const hp = ctx.createBiquadFilter();
      hp.type='highpass';
      hp.frequency.value = expMap01(p.y, 1200, 7600);

      const noiseLP = ctx.createBiquadFilter();
      noiseLP.type = 'lowpass';
      noiseLP.frequency.value = expMap01(p.x, 2500, 9000);

      const noiseGain = ctx.createGain();
      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const f = expMap01(t.pitch, 150, 430) * Math.pow(2,t.tune/12);

      scheduleAutomationCurve(osc.frequency, time, 0.02 + ampDecay*0.24, f, f*0.48, curve, 50);
      osc.frequency.setTargetAtTime(f,time+0.03,0.012);

      toneGain.gain.value = 0.42 + (1-p.z)*0.62;
      noiseGain.gain.value = 0.28 + p.z*1.35;

      osc.connect(toneBP);
      toneBP.connect(toneGain);
      toneGain.connect(amp);

      noise.connect(hp);
      hp.connect(noiseLP);
      noiseLP.connect(noiseGain);
      noiseGain.connect(amp);

      amp.connect(out.input);
      applyAmpEnv(amp.gain,time,0.08+ampDecay*0.68,curve,1.0);

      osc.start(time);
      osc.stop(time+0.9);
    }

    else if(model === 'Clap'){
      const noise = noiseSource(time, 0.65);
      const bp = ctx.createBiquadFilter();
      bp.type='bandpass';
      bp.frequency.value = expMap01(p.x, 1200, 3800);
      bp.Q.value = lerp(0.25, 4.0, p.y);

      const shaper = ctx.createWaveShaper();
      shaper.curve = softClipCurve(0.08 + p.z*0.40);

      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 700;

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      noise.connect(bp);
      bp.connect(shaper);
      shaper.connect(hp);
      hp.connect(amp);
      amp.connect(out.input);

      const bursts = [
        {d:0.000, a:1.00},
        {d:0.016, a:0.88},
        {d:0.032, a:0.76},
        {d:0.055, a:0.62}
      ];

      amp.gain.setValueAtTime(floorGain, time);
      bursts.forEach(b => {
        amp.gain.linearRampToValueAtTime(b.a, time+b.d+0.001);
        amp.gain.exponentialRampToValueAtTime(floorGain, time+b.d+0.014+p.t*0.028);
      });

      const tailT = time + 0.080;
      const tailDur = 0.09 + ampDecay*0.75;
      const vals = new Float32Array(48);
      for(let i=0;i<48;i++){
        vals[i] = Math.max(floorGain, 0.62 * curveBlend(curve,i/47));
      }
      amp.gain.setValueAtTime(0.62, tailT);
      amp.gain.setValueCurveAtTime(vals, tailT, tailDur);
      amp.gain.setValueAtTime(floorGain, tailT + tailDur + 0.01);
    }

    else{
      const osc = ctx.createOscillator();
      osc.type='square';

      const noise = noiseSource(time, 0.22);
      const hp = ctx.createBiquadFilter();
      hp.type='highpass';
      hp.frequency.value = expMap01(p.y, 1800, 9600);

      const toneGain = ctx.createGain();
      const noiseGain = ctx.createGain();
      const toneBP = ctx.createBiquadFilter();
      toneBP.type = 'bandpass';
      toneBP.frequency.value = expMap01(p.x, 500, 2400);
      toneBP.Q.value = lerp(0.6, 4.0, p.y);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const f = expMap01(t.pitch, 190, 720) * Math.pow(2,t.tune/12);

      scheduleAutomationCurve(osc.frequency, time, 0.010 + ampDecay*0.16, f, f*0.28, curve, 70);
      osc.frequency.setTargetAtTime(f,time+0.012,0.01);

      toneGain.gain.value = 0.28 + (1-p.z)*0.55;
      noiseGain.gain.value = 0.20 + p.z*0.95;

      osc.connect(toneBP);
      toneBP.connect(toneGain);
      toneGain.connect(amp);

      noise.connect(hp);
      hp.connect(noiseGain);
      noiseGain.connect(amp);

      amp.connect(out.input);
      applyAmpEnv(amp.gain,time,0.03+ampDecay*0.22,curve,0.98);

      osc.start(time);
      osc.stop(time+0.28);
    }
  }

  function triggerHat(ti, t, s, time, vel){
    const p = resolvedParams(t,s);
    const curve = t.curve;
    const isClosed = t.model === 'Closed Hat';
    const isRide = t.model === 'Ride';
    const isOpen = t.model === 'Open Hat';

    const levelMul = isRide ? 0.95 : isOpen ? 0.88 : 0.78;
    const out = createTrackOut(ti, t.level * vel * levelMul, t.pan);

    const base = isRide
      ? expMap01(t.pitch, 250, 520)
      : isOpen
        ? expMap01(t.pitch, 220, 520)
        : expMap01(t.pitch, 260, 620);

    const spread = isRide ? lerp(0.96,1.28,p.z) : lerp(0.92,1.18,p.z);
    const ratios = [1,1.31,1.78,2.21,2.93,3.72,4.15,5.09].map((r,i)=>r * lerp(1,spread,i/7));
    const bank = makeMetallicOscBank(8, base, ratios, 'square');

    const preBP = ctx.createBiquadFilter();
    preBP.type = 'bandpass';
    preBP.frequency.value = isRide ? expMap01(t.pitch, 2600, 7800) : expMap01(t.pitch, 3600, 9800);
    preBP.Q.value = isRide ? 0.55 : 0.85;

    const metalBP = ctx.createBiquadFilter();
    metalBP.type = 'bandpass';
    metalBP.frequency.value = isRide
      ? Math.max(2200, expMap01(p.x, 2600, 9500))
      : Math.max(3200, expMap01(p.x, 3400, 12000));
    metalBP.Q.value = isRide ? lerp(0.3, 3.0, p.y) : lerp(0.6, 8.0, p.y);

    const hpTing = ctx.createBiquadFilter();
    hpTing.type = 'highpass';
    hpTing.frequency.value = isRide ? expMap01(p.t, 2600, 9200) : expMap01(p.t, 4800, 12000);

    const nonlinear = ctx.createWaveShaper();
    nonlinear.curve = softClipCurve(isRide ? 0.03 + p.z * 0.15 : 0.06 + p.z * 0.22);

    const metalGain = ctx.createGain();
    const tingGain = ctx.createGain();
    const metalAmp = ctx.createGain();
    const tingAmp = ctx.createGain();

    metalAmp.gain.value = floorGain;
    tingAmp.gain.value = floorGain;

    bank.sum.connect(preBP);
    preBP.connect(metalBP);
    metalBP.connect(nonlinear);
    nonlinear.connect(metalGain);
    metalGain.connect(metalAmp);
    metalAmp.connect(out.input);

    preBP.connect(hpTing);
    hpTing.connect(tingGain);
    tingGain.connect(tingAmp);
    tingAmp.connect(out.input);

    const mainDecay = isClosed
      ? lerp(0.025, 0.11, Math.max(0.06, t.decay))
      : isRide
        ? lerp(0.38, 1.25, Math.max(0.16, t.decay))
        : lerp(0.14, 0.56, Math.max(0.10, t.decay));

    const tingDecay = isClosed
      ? 0.010 + p.t * 0.020
      : isRide
        ? 0.06 + p.t * 0.20
        : 0.028 + p.t * 0.07;

    metalGain.gain.value = isRide ? 1.00 : isOpen ? 0.84 : 0.74;
    tingGain.gain.value = isRide ? 0.30 + p.t * 0.38 : isOpen ? 0.18 + p.t * 0.46 : 0.10 + p.t * 0.32;

    if(isClosed && lastOpenHatVca){
      try{
        lastOpenHatVca.gain.cancelScheduledValues(time);
        lastOpenHatVca.gain.setTargetAtTime(floorGain, time, 0.004);
      }catch(err){
        console.warn('Open hat choke warning', err);
      }
    }

    if(isOpen){
      lastOpenHatVca = metalAmp;
    }

    applyAmpEnv(metalAmp.gain, time, mainDecay, curve, isRide ? 0.78 : isOpen ? 0.92 : 1.0);
    applyAmpEnv(tingAmp.gain, time, tingDecay, 0.18 + curve*0.25, isRide ? 0.48 : isOpen ? 0.42 : 0.34);

    bank.oscs.forEach(o => o.start(time));
    const stopT = time + Math.max(0.18, mainDecay + 0.22);
    bank.oscs.forEach(o => o.stop(stopT));
  }

  function triggerPerc(ti, t, s, time, vel){
    const p = resolvedParams(t,s);
    const model = t.model;
    const out = createTrackOut(ti, t.level * vel * (model === 'Cowbell' ? 1.06 : model === 'Metal Perc' ? 0.92 : 1.0), t.pan);
    const curve = t.curve;

    if(model === 'Cowbell'){
      const base = expMap01(t.pitch, 340, 760) * Math.pow(2, t.tune/12);
      const character = lerp(0.98, 1.08, p.z);
      const rawRatios = [1,1.41,1.73,2.18,2.72,3.19,3.88,4.34,4.97,5.61,6.24,6.88,7.57,8.06,8.79,9.41,10.08,10.91];
      const ratios = rawRatios.map((r,i)=>r * lerp(1, character, i/rawRatios.length));
      const bank = makeMetallicOscBank(18, base, ratios, 'sine');

      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 320;

      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = Math.max(2000, expMap01(p.x, 2200, 11000));
      lp.Q.value = 0.22;

      const bodyShaper = ctx.createWaveShaper();
      bodyShaper.curve = softClipCurve(0.04 + p.z * 0.12);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const noise = noiseSource(time, 0.018 + p.t * 0.05);
      const noiseHP = ctx.createBiquadFilter();
      noiseHP.type = 'highpass';
      noiseHP.frequency.value = 2500;
      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.010 + p.t * 0.06;

      bank.sum.connect(hp);
      hp.connect(lp);
      lp.connect(bodyShaper);
      bodyShaper.connect(amp);
      amp.connect(out.input);

      noise.connect(noiseHP);
      noiseHP.connect(noiseGain);
      noiseGain.connect(out.input);

      const baseCut = Math.max(2000, expMap01(p.x, 2200, 7600));
      const envCut = baseCut + lerp(0, 1600, p.y);
      lp.frequency.setValueAtTime(envCut, time);
      lp.frequency.exponentialRampToValueAtTime(baseCut, time + 0.03 + p.y * 0.03);

      applyAmpEnv(amp.gain, time, 0.07 + Math.max(0.06, t.decay) * 0.34, curve, 1.02);

      bank.oscs.forEach(o => o.start(time));
      bank.oscs.forEach(o => o.stop(time + 0.65));
    }

    else if(model === 'Clave'){
      const osc = ctx.createOscillator();
      osc.type = 'triangle';

      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = expMap01(p.x, 1600, 4600);
      bp.Q.value = lerp(1.6, 8.5, p.y);

      const shaper = ctx.createWaveShaper();
      shaper.curve = softClipCurve(0.10 + p.z * 0.32);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      const f = expMap01(t.pitch, 1000, 2400) * Math.pow(2, t.tune/12);

      scheduleAutomationCurve(osc.frequency, time, 0.006 + t.decay * 0.06, f, f * 0.10, curve, 150);
      osc.frequency.setTargetAtTime(f, time + 0.01, 0.008);

      osc.connect(bp);
      bp.connect(shaper);
      shaper.connect(amp);
      amp.connect(out.input);

      applyAmpEnv(amp.gain, time, 0.012 + t.decay * 0.08, curve, 1.05);

      osc.start(time);
      osc.stop(time + 0.18);
    }

    else{
      const base = expMap01(t.pitch, 280, 760);
      const ratios = [1,1.47,2.03,2.62,3.11,4.07];
      const bank = makeMetallicOscBank(6, base, ratios.map(r => r * lerp(0.98, 1.07, p.z)), 'square');

      const hp = ctx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 700;

      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = Math.max(2200, expMap01(p.x, 2400, 9000));
      bp.Q.value = lerp(0.5, 4.8, p.y);

      const shaper = ctx.createWaveShaper();
      shaper.curve = softClipCurve(0.03 + p.z * 0.14);

      const amp = ctx.createGain();
      amp.gain.value = floorGain;

      bank.sum.connect(hp);
      hp.connect(bp);
      bp.connect(shaper);
      shaper.connect(amp);
      amp.connect(out.input);

      applyAmpEnv(amp.gain, time, 0.035 + Math.max(0.05, t.decay) * 0.14, curve, 0.88);

      bank.oscs.forEach(o => o.start(time));
      bank.oscs.forEach(o => o.stop(time + 0.34));
    }
  }

  function secondsPerStep(){
    return 60 / state.bpm / 4;
  }

  function scheduleStep(stepIndex, time){
    tracks().forEach((t, ti) => {
      const s = t.steps[stepIndex];
      if(!s.on) return;
      if(Math.random() > s.prob) return;

      const micro = Number.isFinite(s.micro) ? s.micro : 0;
      const velBase = Number.isFinite(s.vel) ? s.vel : 0.8;
      const accent = Number.isFinite(s.accent) ? s.accent : 0;
      const microTime = time + micro;
      const vel = velocityWithAccent(velBase, accent);

      try{
        triggerTrack(ti, microTime, vel, s);
      }catch(err){
        console.error(`Voice error track=${ti} step=${stepIndex}`, err, s, t);
      }
    });
  }

  function scheduler(){
    while(nextNoteTime < ctx.currentTime + scheduleAheadTime){
      const stepDur = secondsPerStep();
      const swingOffset = (currentStep % 2 === 1) ? stepDur * state.swing : 0;
      const scheduledTime = nextNoteTime + swingOffset;

      try{
        scheduleStep(currentStep, scheduledTime);
      }catch(err){
        console.error('Step scheduling error at step', currentStep, err);
      }

      const uiStep = currentStep;
      setTimeout(() => {
        setLed('stepDisplay', String(uiStep+1).padStart(2,'0'), 'warn');
        if(state.selectedTrack >= 0) renderStepGrid();
      }, Math.max(0, (scheduledTime - ctx.currentTime) * 1000));

      nextNoteTime += stepDur;
      currentStep = (currentStep + 1) % STEPS;
    }
  }

  function togglePlay(){
    isPlaying = !isPlaying;
    if(isPlaying){
      currentStep = 0;
      nextNoteTime = ctx.currentTime + 0.03;
      schedulerId = setInterval(scheduler, lookaheadMs);
      setLed('playState','PLAY','on');
      document.getElementById('playBtn').textContent = 'Stop';
    }else{
      clearInterval(schedulerId);
      schedulerId = null;
      setLed('playState','STOP','');
      document.getElementById('playBtn').textContent = 'Play';
      renderStepGrid();
    }
  }

  function analyserPeak(analyser){
    const data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    let peak = 0;
    for(let i=0;i<data.length;i++){
      const amp = Math.abs(data[i] - 128) / 128;
      if(amp > peak) peak = amp;
    }
    return peak;
  }

  function startMeters(){
    function tick(){
      if(masterAnalyser){
        const mp = analyserPeak(masterAnalyser);
        const mw = Math.min(100, mp * 140);
        const mbar = document.getElementById('vu-master');
        const mtxt = document.getElementById('vu-master-txt');
        if(mbar) mbar.style.width = mw + '%';
        if(mtxt) mtxt.textContent = Math.round(mw) + '%';
      }

      trackChains.forEach((chain, i) => {
        if(!chain?.analyser) return;
        const p = analyserPeak(chain.analyser);
        const w = Math.min(100, p * 150);
        const bar = document.getElementById('vu-'+i);
        const txt = document.getElementById('vuTxt-'+i);
        if(bar) bar.style.width = w + '%';
        if(txt) txt.textContent = Math.round(w) + '%';
      });

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  initPatterns();
  bindGlobal();
  switchPattern('A');
  renderTracks();
  renderStepGrid();
  renderStepEditor();
})();
</script>
